# VS Code 확장 배포
# Composite Action: https://github.com/choihunchul/github--actions/publish-vscode-extension
#
# Reusable workflow(uses: .../publish-vscode-extension.yml)는 호출자 repo 기준으로
# ./publish-vscode-extension 경로를 찾기 때문에 vsimage에서는 composite action을 사용합니다.
#
# 필요한 secrets:
#   VSCE_PAT  - VS Code Marketplace PAT (Azure DevOps)
#   OVSX_PAT  - Open VSX Registry PAT (https://open-vsx.org/user-settings/tokens)

name: Publish Extension

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_marketplace:
        description: Skip VS Code Marketplace
        required: false
        type: boolean
        default: false
      skip_openvsx:
        description: Skip Open VSX
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Marketplaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "Version OK: ${VERSION}"

      - name: Publish to Open VSX & VS Code Marketplace
        uses: choihunchul/github--actions/publish-vscode-extension@main
        with:
          vsce-pat: ${{ secrets.VSCE_PAT }}
          ovsx-pat: ${{ secrets.OVSX_PAT }}
          build-command: npm run package
          vsce-package-args: --no-dependencies
          vsce-publish-args: --no-dependencies
          publish-vscode: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_marketplace }}
          publish-openvsx: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_openvsx }}
