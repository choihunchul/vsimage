# VS Code 확장 배포

name: Publish Extension

# Tag push only — avoid duplicate runs when a GitHub Release is published for the same tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_marketplace:
        description: Skip VS Code Marketplace
        required: false
        type: boolean
        default: false
      skip_openvsx:
        description: Skip Open VSX
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Marketplaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "Version OK: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run package

      - name: Package VSIX
        run: npx --yes @vscode/vsce@latest package --no-dependencies --out extension.vsix

      - name: Publish to Open VSX Registry
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_openvsx }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set +e
          OUTPUT=$(npx --yes ovsx@latest publish extension.vsix --pat "$OVSX_PAT" 2>&1)
          CODE=$?
          echo "$OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "Open VSX publish succeeded."
            exit 0
          fi
          if echo "$OUTPUT" | grep -qiE "already published|already exists"; then
            echo "::warning::Open VSX: this version is already uploaded. If it is inactive, activate it at https://open-vsx.org/extension/choihunchul/vsimage"
            exit 0
          fi
          exit "$CODE"

      - name: Publish to VS Code Marketplace
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_marketplace }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce@latest publish --packagePath extension.vsix --no-dependencies
