# VS Code 확장 배포
# Reusable Workflow: https://github.com/choihunchul/github--actions
#
# 필요한 secrets:
#   VSCE_PAT  - VS Code Marketplace PAT (Azure DevOps)
#   OVSX_PAT  - Open VSX Registry PAT (https://open-vsx.org/user-settings/tokens)

name: Publish Extension

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_marketplace:
        description: Skip VS Code Marketplace
        required: false
        type: boolean
        default: false
      skip_openvsx:
        description: Skip Open VSX
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "Version OK: ${VERSION}"

  publish:
    name: Publish to Marketplaces
    needs: validate
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    uses: choihunchul/github--actions/.github/workflows/publish-vscode-extension.yml@main
    with:
      build-command: npm run package
      vsce-package-args: --no-dependencies
      vsce-publish-args: --no-dependencies
      publish-vscode: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_marketplace }}
      publish-openvsx: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_openvsx }}
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
